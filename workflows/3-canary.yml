name: Canary Deployment Pipeline (Gradual)

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  packages: write

jobs:
  # --- 1. 构建阶段 ---
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.vars.outputs.sha_short }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:${{ steps.vars.outputs.sha_short }}

  # --- 2. 部署 25% 流量 ---
  deploy-canary-25:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: SSH Deploy 25%
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            IMAGE_TAG="${{ needs.build-and-push.outputs.image_tag }}"
            REPO_PATH="${{ github.repository }}"
            
            # 部署 V2 实例和金丝雀 Ingress (初始权重 25)
            cat <<EOF | kubectl apply -f -
            apiVersion: apps/v1
            kind: Deployment
            metadata:
              name: zentrix-v2-canary
            spec:
              replicas: 1
              selector:
                matchLabels:
                  app: zentrix
                  version: v2
              template:
                metadata:
                  labels:
                    app: zentrix
                    version: v2
                spec:
                  imagePullSecrets: [{name: ghcr-login}]
                  containers:
                  - name: lab-container
                    image: ghcr.io/${REPO_PATH}:${IMAGE_TAG}
                    ports:
                    - containerPort: 80
            ---
            apiVersion: v1
            kind: Service
            metadata:
              name: zentrix-v2-service
            spec:
              ports:
                - port: 80
                  targetPort: 80
              selector:
                app: zentrix
                version: v2
            ---
            apiVersion: networking.k8s.io/v1
            kind: Ingress
            metadata:
              name: zentrix-ingress-canary
              annotations:
                nginx.ingress.kubernetes.io/canary: "true"
                nginx.ingress.kubernetes.io/canary-weight: "25"
            spec:
              ingressClassName: nginx
              rules:
              - http:
                  paths:
                  - path: /
                    pathType: Prefix
                    backend:
                      service:
                        name: zentrix-v2-service
                        port:
                          number: 80
            EOF
            kubectl rollout status deployment zentrix-v2-canary --timeout=60s
            echo "✅ 25% 流量已切换至新版本。"

  # --- 3. 部署 50% 流量 (人工审核点 1) ---
  deploy-canary-50:
    needs: [build-and-push, deploy-canary-25]
    runs-on: ubuntu-latest
    environment: canary-50
    steps:
      - name: SSH Promote to 50%
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            echo "📈 正在将权重调整为 50%..."
            kubectl annotate ingress zentrix-ingress-canary nginx.ingress.kubernetes.io/canary-weight="50" --overwrite
            echo "✅ 50% 流量已切换。"

  # --- 4. 全量转正 (人工审核点 2) ---
  promote-to-production:
    needs: [build-and-push, deploy-canary-50]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: SSH Full Release
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            IMAGE_TAG="${{ needs.build-and-push.outputs.image_tag }}"
            REPO_PATH="${{ github.repository }}"
            
            echo "🚀 正在进行全量转正..."
            # 1. 升级主版本 V1
            kubectl set image deployment/zentrix-v1 lab-container=ghcr.io/${REPO_PATH}:${IMAGE_TAG}
            kubectl rollout status deployment zentrix-v1 --timeout=90s

            # 2. 清理金丝雀
            kubectl delete ingress zentrix-ingress-canary --ignore-not-found
            kubectl scale deployment zentrix-v2-canary --replicas=0
            
            echo "🎉 发布成功，V1 已升级为最新镜像，所有流量已回归主路径。"