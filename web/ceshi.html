<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>测试页面 - Zentrix Lab</title>
    <style>
        body { margin: 0; font-family: sans-serif; background: #f8fafc; color: #1e293b; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .card { text-align: center; padding: 3rem; border-radius: 1rem; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); border: 1px solid rgba(0,0,0,0.1); box-shadow: 0 25px 50px -12px rgba(0,0,0,0.1); }
        h1 { font-size: 3rem; background: linear-gradient(to right, #38bdf8, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 1rem; }
        .status { color: #f59e0b; font-weight: bold; border: 1px solid #f59e0b; padding: 0.5rem 1rem; border-radius: 2rem; display: inline-block; margin-top: 1rem; }
        .deploy-info { margin-top: 2rem; font-size: 0.8rem; color: #64748b; }
        a.back { display: inline-block; margin-top: 1.5rem; color: #3b82f6; text-decoration: none; font-size: 0.9rem; }
        a.back:hover { text-decoration: underline; }
        .feature-list { margin-top: 2rem; text-align: left; }
        .feature-list li { padding: 0.5rem 0; color: #475569; }
    </style>
</head>
<body>
    <div class="card">
        <h1>测试页面</h1>
        <p>这是第二个演示页面</p>
        <div class="status">● 测试模式</div>
        <ul class="feature-list">
            <li>✅ 页面功能正常</li>
            <li>✅ 路由配置正确</li>
            <li>✅ Nginx 运行良好</li>
        </ul>
        <div class="deploy-info">由 GitHub Actions 自动构建发布</div>
        <a href="/" class="back">← 返回首页</a>
    </div>
</body>
</html>
