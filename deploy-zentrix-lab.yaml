# zentrix-lab.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zentrix-lab
  labels:
    app: zentrix-lab
spec:
  replicas: 1
  # 与你 deploy.yml 中提到的 Recreate 策略保持一致
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: zentrix-lab
  template:
    metadata:
      labels:
        app: zentrix-lab
    spec:
      containers:
      - name: zentrix-lab
        # 替换为你实际的 GHCR 镜像地址（与 CI 构建的镜像保持一致）
        image: ghcr.io/zentrix566/devops:latest
        ports:
        - containerPort: 80
          name: http
        # 健康检查配置，匹配你项目中的 /health 端点
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 2
          periodSeconds: 5
          timeoutSeconds: 2
        # 资源限制配置，可根据实际情况调整
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
---
# 内部 Service 配置
apiVersion: v1
kind: Service
metadata:
  name: zentrix-lab-svc
  labels:
    app: zentrix-lab
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: http
    name: http
  selector:
    app: zentrix-lab
---
# 可选：Ingress 配置（如果需要外部访问）
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: zentrix-lab-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
  - http: 
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: zentrix-lab-svc
            port:
              name: http
