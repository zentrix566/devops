name: "Zentrix Full CI/CD Pipeline"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # 统一转换为小写，防止 GitHub 用户名大写导致 Docker 镜像名报错
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ==========================================
  # 阶段 1：基础规范审查 (门禁)
  # ==========================================
  lint:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        id: hadolint
        with:
          dockerfile: Dockerfile
          format: tty
          no-fail: true 

      - name: Post Comment to PR
        # 仅在 PR 且 lint 失败时评论
        if: steps.hadolint.outcome != 'success' && github.event_name == 'pull_request'
        uses: mshick/add-pr-comment@v2
        with:
          message: |
            ## 🤖 Zentrix 审查官报告
            🔍 **Dockerfile 检测到规范问题：**
            ```text
            ${{ steps.hadolint.outputs.results }}
            ```
            > ❌ 审查未通过，请修复后再次提交，否则无法启动构建。

      - name: Check Lint Status
        if: steps.hadolint.outcome != 'success'
        run: exit 1

  # ==========================================
  # 阶段 2：构建与推送 (只有 Lint 通过才运行)
  # ==========================================
  build-and-push:
    needs: lint
    # 只有在主分支 push 或者手动触发时才进行构建
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # 使用 lower case 转换镜像名
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  # ==========================================
  # 阶段 3：远程部署 (只有 Build 成功才运行)
  # ==========================================
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: SSH Remote Deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            # 重启服务，拉取最新镜像
            kubectl rollout restart deployment zentrix-lab
            kubectl rollout status deployment zentrix-lab --timeout=90s