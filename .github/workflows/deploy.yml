name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy:
        description: 'Enable SSH deployment'
        required: false
        default: false
        type: boolean

jobs:
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: devops:latest
          outputs: type=docker,dest=/tmp/image.tar

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/image.tar
          retention-days: 7

  deploy:
    name: SSH Deploy
    runs-on: ubuntu-latest
    needs: build
    if: |
      github.ref == 'refs/heads/main' &&
      (github.event.inputs.deploy == 'true' || github.event_name == 'push')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Check SSH secrets
        id: check-secrets
        run: |
          if [ -z "${{ secrets.SSH_HOST }}" ] || [ -z "${{ secrets.SSH_USER }}" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "::warning::SSH secrets not configured, skipping deployment"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to server via SSH
        if: steps.check-secrets.outputs.skip != 'true'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY || '' }}
          password: ${{ secrets.SSH_PASS || '' }}
          port: ${{ secrets.SSH_PORT || 22 }}
          timeout: 30s
          command_timeout: 10m
          script: |
            echo "🚀 Starting deployment..."

            # Create temp directory if needed
            mkdir -p ~/deploy-tmp
            cd ~/deploy-tmp

            # Stop and remove old container if exists
            docker stop devops-nginx 2>/dev/null || true
            docker rm devops-nginx 2>/dev/null || true

            # Build image directly on server (simpler than transferring)
            echo "Building Docker image on server..."
            docker build -t devops:latest - << 'EOF'
            FROM nginx:alpine
            RUN rm /etc/nginx/nginx.conf && rm -rf /usr/share/nginx/html/*
            COPY nginx.conf /etc/nginx/nginx.conf
            COPY index.html /usr/share/nginx/html/
            COPY web/*.html /usr/share/nginx/html/
            EXPOSE 80
            CMD ["nginx", "-g", "daemon off;"]
            EOF

            # Run new container
            echo "Starting container..."
            docker run -d \
              --name devops-nginx \
              --restart=always \
              -p 80:80 \
              devops:latest

            # Verify deployment
            sleep 3
            if docker ps --filter name=devops-nginx --format "{{.Names}}" | grep -q devops-nginx; then
              echo "✅ Deployment completed successfully!"
              docker ps --filter name=devops-nginx
            else
              echo "❌ Deployment failed - container not running"
              docker logs devops-nginx 2>&1 || true
              exit 1
            fi
