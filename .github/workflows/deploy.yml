name: "Zentrix Full CI/CD Pipeline"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        id: hadolint
        with:
          dockerfile: Dockerfile
          format: tty
          # 关键改动：去掉 no-fail，由下方的 continue-on-error 接管
        continue-on-error: true # 无论 Hadolint 报什么错，都强制继续执行后续步骤

      - name: Post Comment to PR
        # 仅在有错误且是 PR 时执行
        if: steps.hadolint.outcome == 'failure' && github.event_name == 'pull_request'
        uses: mshick/add-pr-comment@v2
        with:
          message: |
            ## 🤖 Zentrix 审查官报告
            🔍 **Dockerfile 检测到规范问题：**
            ```text
            ${{ steps.hadolint.outputs.results }}
            ```
            > ❌ 审查未通过。
          allow-repeats: false

      - name: Final Enforcement Gate
        # 使用 always() 确保即使 checkout 挂了（虽然概率低）也会跑
        if: always()
        run: |
          # 显式判断上一步的状态
          if [ "${{ steps.hadolint.outcome }}" != "success" ]; then
            echo "❌ 发现 Dockerfile 规范违规。状态: ${{ steps.hadolint.outcome }}"
            exit 1
          else
            echo "✅ 代码规范检查通过。"
          fi

  build-and-push:
    needs: lint
    if: |
      github.event_name == 'push' || 
      github.event_name == 'workflow_dispatch'
    # 注意：不再在 build 任务里写 always()，因为我们需要它在 lint 失败时被跳过
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/zentrix-lab:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: SSH Remote Deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            kubectl rollout restart deployment zentrix-lab
            kubectl rollout status deployment zentrix-lab --timeout=90s