name: Canary Deployment Pipeline

on:
  push:
    branches: [ "main" ]

# 🚀 权限配置：允许写入 GHCR 镜像库
permissions:
  contents: read
  packages: write

jobs:
  # --- 第一阶段：构建并推送镜像 ---
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.vars.outputs.sha_short }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.vars.outputs.sha_short }}
            ghcr.io/${{ github.repository }}:latest

  # --- 第二阶段：金丝雀部署 (25% 流量) ---
  deploy-canary:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: SSH Deploy Canary
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            IMAGE_TAG="${{ needs.build-and-push.outputs.image_tag }}"
            REPO_PATH="${{ github.repository }}"
            
            echo "🚀 正在部署金丝雀版本 (V2): ${IMAGE_TAG}"

            # 动态生成并应用 V2 Deployment & Service
            cat <<EOF | kubectl apply -f -
            apiVersion: apps/v1
            kind: Deployment
            metadata:
              name: zentrix-v2-canary
            spec:
              replicas: 1
              selector:
                matchLabels:
                  app: zentrix
                  version: v2
              template:
                metadata:
                  labels:
                    app: zentrix
                    version: v2
                spec:
                  imagePullSecrets: [{name: ghcr-login}]
                  containers:
                  - name: lab-container
                    image: ghcr.io/${REPO_PATH}:${IMAGE_TAG}
                    ports:
                    - containerPort: 80
            ---
            apiVersion: v1
            kind: Service
            metadata:
              name: zentrix-v2-service
            spec:
              ports:
                - port: 80
                  targetPort: 80
              selector:
                app: zentrix
                version: v2
            EOF

            # 动态生成并应用金丝雀 Ingress (权重 25%)
            cat <<EOF | kubectl apply -f -
            apiVersion: networking.k8s.io/v1
            kind: Ingress
            metadata:
              name: zentrix-ingress-canary
              annotations:
                nginx.ingress.kubernetes.io/canary: "true"
                nginx.ingress.kubernetes.io/canary-weight: "25"
            spec:
              ingressClassName: nginx
              rules:
              - http:
                  paths:
                  - path: /
                    pathType: Prefix
                    backend:
                      service:
                        name: zentrix-v2-service
                        port:
                          number: 80
            EOF

            # 等待 V2 Pod 启动就绪
            kubectl rollout status deployment zentrix-v2-canary --timeout=60s
            echo "✅ 金丝雀版本已上线，当前承载 25% 流量。"

