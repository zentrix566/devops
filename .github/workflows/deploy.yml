name: Canary Deployment Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:latest

  deploy-canary:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: SSH Deploy Canary
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            # 1. 应用金丝雀配置（10% 流量）
            # 假设你已经把上面的 yaml 传到了服务器
            kubectl apply -f /root/canary-deploy.yaml
            
            # 2. 强制重启金丝雀 Pod 确保拉取最新镜像
            kubectl rollout restart deployment zentrix-v2-canary
            
            echo "Canary 已发布！当前 10% 流量在 V2。请检查日志并访问 IP 确认。"