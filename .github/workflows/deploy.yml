name: "Zentrix Full CI/CD Pipeline"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ==========================================
  # 阶段 1：Lint 门禁
  # ==========================================
  lint:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    # 核心：定义 Job 级别的输出，确保状态可追踪
    outputs:
      lint_outcome: ${{ steps.hadolint.outcome }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        id: hadolint
        with:
          dockerfile: Dockerfile
          format: tty
          no-fail: true # 为了让机器人能在报错后继续发言

      - name: Post Comment to PR
        if: steps.hadolint.outcome != 'success' && github.event_name == 'pull_request'
        uses: mshick/add-pr-comment@v2
        with:
          message: |
            ## 🤖 Zentrix 审查官报告
            🔍 **Dockerfile 检测到规范问题：**
            ```text
            ${{ steps.hadolint.outputs.results }}
            ```
            > ❌ 审查未通过，构建流水线已熔断。请修复后再提交！
          allow-repeats: false

      # 关键拦截逻辑：只要不是 success，直接强制退出
      - name: Final Enforcement Gate
        if: steps.hadolint.outcome != 'success'
        run: |
          echo "Lint status is ${{ steps.hadolint.outcome }}. Failing job to block downstream tasks."
          exit 1

  # ==========================================
  # 阶段 2：Build & Push (只有 lint 真正成功才运行)
  # ==========================================
  build-and-push:
    needs: lint
    # 增加严格判断：只有 needs.lint 的结果确实是 success 且是 push/dispatch 才会跑
    if: |
      always() && 
      needs.lint.result == 'success' && 
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/zentrix-lab:latest

  # ==========================================
  # 阶段 3：SSH Deploy
  # ==========================================
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: SSH Remote Deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            kubectl rollout restart deployment zentrix-lab
            kubectl rollout status deployment zentrix-lab --timeout=90s