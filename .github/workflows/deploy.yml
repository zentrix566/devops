name: Canary Deployment Pipeline

on:
  push:
    branches: [ "main" ]

# 🚀 必须要加这个权限块，否则写入 GHCR 会失败
permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          # 💡 强制使用 github.actor 以确保路径匹配
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # 🚀 确保 tags 缩进正确，且使用管道符 |
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:v1

  deploy-canary:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: SSH Deploy Canary
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }} # 建议显式加上端口
          script: |
            # 1. 应用金丝雀配置（10% 流量）
            kubectl apply -f /root/canary-deploy.yaml
            
            # 2. 强制重启金丝雀 Pod
            kubectl rollout restart deployment zentrix-v2-canary
            
            # 3. 等待启动完成（可选，增加稳定性）
            kubectl rollout status deployment zentrix-v2-canary --timeout=60s
            
            echo "Canary 已发布！当前 10% 流量在 V2。"