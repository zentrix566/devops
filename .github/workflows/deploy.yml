name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: SSH Remote Deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            echo "🚀 Starting deployment..."
            cd ~/devops
            git pull
            docker stop devops-nginx 2>/dev/null || true
            docker rm devops-nginx 2>/dev/null || true
            docker build -t devops:latest .
            docker run -d --name devops-nginx --restart=always -p 80:80 devops:latest
            echo "✅ Deployment completed!"
