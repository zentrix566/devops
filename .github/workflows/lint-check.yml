name: "Linter Service with Bot"

on:
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write # 必须赋予写 PR 评论的权限
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. 运行 Hadolint 并将结果保存到文件
      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        id: hadolint # 给这一步起个 ID，方便后面引用
        with:
          dockerfile: Dockerfile
          format: tty # 输出为可读文本
          no-fail: true # 重点：先别让任务挂掉，否则走不到评论那一步

      # 2. 只有当有错误时，机器人才出来评论
      - name: Post Comment to PR
        if: steps.hadolint.outcome != 'success' # 如果检查没通过
        uses: mshick/add-pr-comment@v2
        with:
          message: |
            ## 🤖 Zentrix 审查官报告
            🔍 **Dockerfile 检测到规范问题：**
            ```text
            ${{ steps.hadolint.outputs.results }}
            ```
            > 请修复上述问题后再次提交，保持代码优雅！🚀
          allow-repeats: false # 避免重复刷屏